<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>


body{
margin:0;
font-family:Arial;

/* حل مشاكل الموبايل */
background-image: url('bg.png');
background-size: cover;
background-position: center;
background-repeat: no-repeat;

/* مهم جدًا للموبايل */
background-attachment: scroll;

height:100vh;
}

/* صفحة الدخول */
#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:15px 20px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
margin-top:10px;
}

/* الصفحة الرئيسية */
#main{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:100%;
}

/* العنوان */
h1{
font-size:35px;
margin-bottom:20px;
text-shadow:0 0 10px #000;
}

/* البوكس */
.timer-box{
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:20px;
display:inline-block;
}

/* الأرقام */
.time{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

.unit{
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:15px;
width:80px;
}

.num{
font-size:25px;
font-weight:bold;
}

.label{
font-size:14px;
}

/* القلوب */
.heart{
position:absolute;
color:red;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<!-- صفحة الباسورد -->
<div id="login">
<h2>ادخل كلمة السر 💖</h2>
<input type="password" id="pass" placeholder="كلمة السر">
<br>
<button onclick="checkPass()">دخول</button>
</div>

<!-- الصفحة الرئيسية -->
<div id="main">

<h1>❤️ بداية عمري معاك ❤️</h1>

<div class="timer-box">
<div class="time">

<div class="unit">
<div class="num" id="seconds"></div>
<div class="label">ثانية</div>
</div>

<div class="unit">
<div class="num" id="minutes"></div>
<div class="label">دقيقة</div>
</div>

<div class="unit">
<div class="num" id="hours"></div>
<div class="label">ساعة</div>
</div>

<div class="unit">
<div class="num" id="days"></div>
<div class="label">يوم</div>
</div>

<div class="unit">
<div class="num" id="months"></div>
<div class="label">شهر</div>
</div>

<div class="unit">
<div class="num" id="years"></div>
<div class="label">سنة</div>
</div>

</div>
</div>

</div>

<script>

// كلمة السر
function checkPass(){
var p=document.getElementById("pass").value;

if(p==="batoot"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}else{
alert("كلمة السر غلط ❌");
}
}

// تاريخ البداية (13 فبراير 2025)
var startDate = new Date(2026,1,13);

function updateTimer(){

var now = new Date();
var diff = now - startDate;

var totalSeconds = Math.floor(diff/1000);

var seconds = totalSeconds % 60;
var totalMinutes = Math.floor(totalSeconds/60);

var minutes = totalMinutes % 60;
var totalHours = Math.floor(totalMinutes/60);

var hours = totalHours % 24;
var totalDays = Math.floor(totalHours/24);

// السنوات
var years = Math.floor(totalDays / 365);

// الشهور
var remainingDays = totalDays % 365;
var months = Math.floor(remainingDays / 30);

// الأيام
var days = remainingDays % 30;

document.getElementById("seconds").innerHTML = seconds;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("hours").innerHTML = hours;
document.getElementById("days").innerHTML = days;
document.getElementById("months").innerHTML = months;
document.getElementById("years").innerHTML = years;

}

setInterval(updateTimer,1000);

// القلوب
function createHeart(){
var heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},6000);
}

setInterval(createHeart,500);

</script>

</body>
</html>
