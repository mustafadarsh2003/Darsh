<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>بداية عمري معاكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: white;
            margin: 0;
            /* السماح بالتمرير العمودي فقط عند الحاجة لضمان عمله على الموبايل */
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #3d0a26 0%, #1a0b2e 60%, #000000 100%);
            z-index: -1;
        }

        .light-orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(255, 105, 180, 0.12);
            filter: blur(80px);
            border-radius: 50%;
            animation: move-orb 15s infinite alternate ease-in-out;
        }

        @keyframes move-orb {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(10%, 10%) scale(1.1); }
        }

        #login-screen {
            text-align: center;
            z-index: 100;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 25px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
            max-width: 350px;
        }

        .password-input {
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 105, 180, 0.3);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            width: 100%;
            margin-bottom: 1.5rem;
            -webkit-appearance: none; /* لمنع مشاكل التصميم في آيفون */
        }

        .login-btn {
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            color: white;
            font-weight: bold;
            padding: 12px;
            border-radius: 12px;
            width: 100%;
            transition: 0.3s;
            cursor: pointer;
        }

        #main-content {
            display: none;
            text-align: center;
            opacity: 0;
            transition: opacity 2s ease-in;
            z-index: 10;
            width: 100%;
            max-width: 600px;
        }

        .number-glow {
            font-size: 2rem; /* تصغير الخط قليلاً للموبايل */
            font-weight: 800;
            text-shadow: 0 0 15px rgba(255, 105, 180, 0.8);
            display: block;
        }

        /* تحسين استجابة العداد على الشاشات الكبيرة */
        @media (min-width: 640px) {
            .number-glow { font-size: 3rem; }
        }

        .heart-float {
            position: absolute;
            pointer-events: none;
            animation: float-up 5s linear forwards;
            z-index: 5;
        }

        @keyframes float-up {
            from { transform: translateY(110vh) rotate(0deg); opacity: 1; }
            to { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* منع مشاكل اللمس في الموبايل */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="light-orb"></div>
        <div class="light-orb" style="right: 0; bottom: 0;"></div>
    </div>

    <!-- واجهة تسجيل الدخول -->
    <div id="login-screen">
        <h2 class="text-xl md:text-2xl mb-6 font-bold text-pink-300 leading-relaxed">كلمة السر ايه يا جميل 😉</h2>
        <input type="password" id="passInput" class="password-input" placeholder="اكتبيها هنا..." autocomplete="off">
        <button onclick="checkPassword()" class="login-btn">دخول ❤️</button>
        <p id="errorMsg" class="text-red-400 mt-4 opacity-0 text-sm">كلمة السر غلط يا بطوطة جربي تاني 😉</p>
    </div>

    <!-- واجهة العداد -->
    <div id="main-content" class="px-4">
        <h1 class="text-2xl md:text-4xl font-bold mb-2">بداية عمري معاكي ❤️</h1>
        <p class="text-md md:text-lg text-pink-200 mb-8">ربنا يديمك ليا طول العمر</p>

        <!-- تغيير الشبكة لتكون مرنة 2 في الصف على الموبايل و 6 على الشاشات الكبيرة -->
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-6 gap-6 md:gap-4">
            <div class="flex flex-col bg-white/5 p-3 rounded-xl border border-white/10">
                <span id="years" class="number-glow">0</span>
                <span class="text-xs text-pink-100 uppercase tracking-widest">سنة</span>
            </div>
            <div class="flex flex-col bg-white/5 p-3 rounded-xl border border-white/10">
                <span id="months" class="number-glow">0</span>
                <span class="text-xs text-pink-100 uppercase tracking-widest">شهر</span>
            </div>
            <div class="flex flex-col bg-white/5 p-3 rounded-xl border border-white/10">
                <span id="days" class="number-glow">0</span>
                <span class="text-xs text-pink-100 uppercase tracking-widest">يوم</span>
            </div>
            <div class="flex flex-col bg-white/5 p-3 rounded-xl border border-white/10">
                <span id="hours" class="number-glow">0</span>
                <span class="text-xs text-pink-100 uppercase tracking-widest">ساعة</span>
            </div>
            <div class="flex flex-col bg-white/5 p-3 rounded-xl border border-white/10">
                <span id="minutes" class="number-glow">0</span>
                <span class="text-xs text-pink-100 uppercase tracking-widest">دقيقة</span>
            </div>
            <div class="flex flex-col bg-white/5 p-3 rounded-xl border border-white/10">
                <span id="seconds" class="number-glow">0</span>
                <span class="text-xs text-pink-100 uppercase tracking-widest">ثانية</span>
            </div>
        </div>

        <p class="mt-16 text-gray-400 italic text-xs pb-10">اقفي هنا شوية متجريش 😂</p>
    </div>

    <script>
        const SECRET_PASSWORD = "batoot"; 

        function checkPassword() {
            const input = document.getElementById('passInput');
            if (input.value.toLowerCase() === SECRET_PASSWORD) {
                unlock();
            } else {
                document.getElementById('errorMsg').style.opacity = "1";
                // هزة بسيطة عند الخطأ
                const screen = document.getElementById('login-screen');
                screen.style.transform = "translateX(10px)";
                setTimeout(() => screen.style.transform = "translateX(-10px)", 100);
                setTimeout(() => screen.style.transform = "translateX(0)", 200);
            }
        }

        function unlock() {
            // تأثير القصاصات
            confetti({ 
                particleCount: 100, 
                spread: 70, 
                origin: { y: 0.6 },
                zIndex: 200 
            });

            const loginScreen = document.getElementById('login-screen');
            loginScreen.style.transform = "scale(0.8) translateY(-100vh)";
            loginScreen.style.opacity = "0";
            
            setTimeout(() => {
                loginScreen.style.display = "none";
                const main = document.getElementById('main-content');
                main.style.display = "block";
                setTimeout(() => {
                    main.style.opacity = "1";
                    startHearts();
                }, 100);
            }, 600);
        }

        // تاريخ البداية
        const startDate = new Date('February 13, 2026 00:00:00').getTime();

        function updateCounter() {
            const now = new Date().getTime();
            const diff = now - startDate;
            const realDiff = diff < 0 ? 0 : diff;

            const second = 1000, minute = second * 60, hour = minute * 60, day = hour * 24;
            const month = day * 30.44, year = day * 365.25;

            document.getElementById('years').innerText = Math.floor(realDiff / year);
            document.getElementById('months').innerText = Math.floor((realDiff % year) / month);
            document.getElementById('days').innerText = Math.floor((realDiff % month) / day);
            document.getElementById('hours').innerText = Math.floor((realDiff % day) / hour);
            document.getElementById('minutes').innerText = Math.floor((realDiff % hour) / minute);
            document.getElementById('seconds').innerText = Math.floor((realDiff % minute) / second);
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart-float';
                heart.innerHTML = ['❤️', '💖', '💕', '✨', '🌸'][Math.floor(Math.random() * 5)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '110vh';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 400);
        }

        setInterval(updateCounter, 1000);
        updateCounter();

        // دعم ضغط Enter من الكيبورد
        document.getElementById('passInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
