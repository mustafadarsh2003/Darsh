<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قصتنا ❤️</title>

<style>

/* الخط */
@font-face {
    font-family: 'Khebrat Musamim';
    src: url('KhebratMusamim.ttf');
}

body{
margin:0;
padding:0;
font-family:'Khebrat Musamim', Arial;
background: url('juIYufKA-fond-decran-amour-35.png') no-repeat center center;
background-size: cover;
color:white;
overflow:hidden;
height:100vh;
}

/* المحتوى في نص الشاشة */
.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
width:100%;
}

/* العنوان */
h1{
font-size:70px;
margin-bottom:20px;
text-shadow:0 0 15px #000,0 0 25px #ff4da6;
}

/* الرسالة */
.message{
font-size:30px;
margin-bottom:40px;
text-shadow:0 0 10px #000;
}

/* العداد */
#timer{
font-size:50px;
background:rgba(0,0,0,0.5);
padding:30px 60px;
border-radius:25px;
display:inline-block;
box-shadow:0 0 30px rgba(0,0,0,0.8);
}

/* الفقاعات */
.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.2);
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
font-weight:bold;
animation:floatUp linear infinite;
backdrop-filter: blur(5px);
border:1px solid rgba(255,255,255,0.3);
}

@keyframes floatUp{
0%{
transform:translateY(100vh) scale(0.5);
opacity:0;
}
50%{
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1>عدّاد ❤️</h1>

<div class="message">
كل لحظة معاكي هي أجمل لحظة في حياتي
</div>

<div id="timer"></div>

</div>

<script>

// تاريخ البداية
var startDate = new Date(2026, 1, 13, 0, 0, 0);

function updateTimer(){
var now = new Date();
var diff = now - startDate;

var days = Math.floor(diff/(1000*60*60*24));
var hours = Math.floor((diff/(1000*60*60))%24);
var minutes = Math.floor((diff/(1000*60))%60);
var seconds = Math.floor((diff/1000)%60);

document.getElementById("timer").innerHTML =
days+" يوم<br>"+
hours+" ساعة "+
minutes+" دقيقة "+
seconds+" ثانية";
}

updateTimer();
setInterval(updateTimer,1000);

// إنشاء الفقاعات
function createBubble(){

var bubble=document.createElement("div");
bubble.className="bubble";

// رقم عشوائي من 1 لـ 10
var names = ["رندا ❤️", "بطوط 🐥"];
bubble.innerHTML = names[Math.floor(Math.random()*names.length)];
// مكان وحجم عشوائي
bubble.style.left=Math.random()*100+"vw";
var size = 80 ;
bubble.style.width=size+"px";
bubble.style.height=size+"px";

bubble.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(bubble);

setTimeout(()=>{
bubble.remove();
},8000);

}

setInterval(createBubble,400);

</script>

</body>
</html>
